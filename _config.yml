title: Aamir S. — Portfolio
email: aamir.s@upwork.com
description: >-
  Portfolio of Aamir S. — PhD SciML Researcher & Applied Mathematician.
url: "https://aamirpreneur.github.io" # the base hostname & protocol for your site
baseurl: "/portfolio" # the subpath of your site, e.g. /blog

# Build settings
markdown: kramdown
theme: minima

# Exclude these files from the build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - package.json
  - README.md
  - task.md
  - walkthrough.md
  - implementation_plan.md

collections:
  projects:
    output: false # Projects are rendered on index, no separate pages needed for now

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
